services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kwiklist
      POSTGRES_PASSWORD: kwikpassword
      POSTGRES_DB: kwiklist_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/kwiklist_db
      - SPRING_DATASOURCE_USERNAME=kwiklist
      - SPRING_DATASOURCE_PASSWORD=kwikpassword
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
